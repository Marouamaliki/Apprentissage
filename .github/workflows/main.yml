name: Workflow CI Build & Push Images Microservices

on:
  push:
    branches:
      - main

jobs:
  Sonarqube-Analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-push:
    needs: Sonarqube-Analysis
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push microservices1
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservices1:latest ./microservices1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/microservices1:latest

      - name: Build and Push microservices2
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/microservices2:latest ./microservices2
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/microservices2:latest
